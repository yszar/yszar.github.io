          # host: "${{ secrets.ALI_HK_PEM }},${{ secrets.ALI_HK_PEM }}"
          host: "123.57.236.141,47.242.67.157"
          username: root
          key: ${{ secrets.ALI_HK_PEM }}
          port: 22
          source: "public"
          target: "/web/tangjiuyang"
          strip_components: 1
